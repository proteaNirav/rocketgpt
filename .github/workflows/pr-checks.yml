name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  pr-checks:
    name: PR Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        run: corepack enable

      - name: Show basic PR context
        run: |
          echo "PR checks workflow running."
          echo "Repository: ${{ github.repository }}"
          echo "PR #:      ${{ github.event.pull_request.number }}"
          echo "Head SHA:  ${{ github.sha }}"

      - name: Environment hygiene check
        run: pnpm env:check

      - name: Library index drift check
        run: pnpm libs:check

      - name: Performance regression guardrails
        run: node rocketgpt_v3_full/webapp/next/scripts/perf-guard.mjs --ci
